apiVersion: apps/v1
kind: Deployment
metadata:
  name: resume-web
  namespace: personal-web-site
  labels:
    app: resume-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resume-web
  template:
    metadata:
      labels:
        app: resume-web
    spec:
      containers:
        - name: resume-web
          image: wololoaeyoyo/humberto-resume:master
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
