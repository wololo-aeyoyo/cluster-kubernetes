apiVersion: apps/v1
kind: Deployment
metadata:
  name: resume-web
  labels:
    app: resume-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resume-web
  template:
    metadata:
      labels:
        app: resume-web
    spec:
      containers:
        - name: resume-web
          image: wololoaeyoyo/humberto-resume:master
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
          envFrom:
            - secretRef:
                name: resume-web-env
                optional: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
      restartPolicy: Always