apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: resume-web-ingress
  namespace: personal-web-site
  annotations:
    kubernetes.io/ingress.class: cloudflare-tunnel
spec:
  rules:
    - host: resume.wololoaeyoyo.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: resume-web-service
                port:
                  number: 3000
