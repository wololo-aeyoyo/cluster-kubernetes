apiVersion: v1
kind: Service
metadata:
  name: minecraft-tailscale
  namespace: minecraft
  annotations:
    tailscale.com/hostname: "minecraft"
    tailscale.com/proxy-group: "default"
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale.com/tailscale
  selector:
    app.kubernetes.io/name: minecraft
    app.kubernetes.io/instance: minecraft-minecraft-deployment
  ports:
    - name: minecraft
      port: 25565
      targetPort: 25565
      protocol: TCP
