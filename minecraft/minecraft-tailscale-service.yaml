apiVersion: v1
kind: Service
metadata:
  name: minecraft-tailscale
  namespace: minecraft
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "minecraft"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: minecraft
    app.kubernetes.io/instance: minecraft-minecraft-deployment
  ports:
    - name: minecraft
      port: 25565
      targetPort: 25565
      protocol: TCP
