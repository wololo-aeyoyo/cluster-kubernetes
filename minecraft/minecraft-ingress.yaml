apiVersion: networking.cfargotunnel.com/v1alpha1  
kind: TunnelBinding  
metadata:  
  name: minecraft-binding
  namespace: default
subjects:
- name: minecraft-minecraft-deployment
  spec:
    protocol: tcp
    fqdn: minecrack.merwebo.org
    target: tcp://minecraft-minecraft-deployment.default.svc:25565
    proxyPort: 25565
tunnelRef:
  kind: ClusterTunnel
  name: tunnel-cluster-mer