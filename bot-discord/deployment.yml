apiVersion: apps/v1
kind: Deployment
metadata:
  name: red-discordbot
  namespace: default
  labels:
    app: red-discordbot
spec:
  replicas: 1   # Must stay at 1 — multiple replicas would corrupt shared bot data
  selector:
    matchLabels:
      app: red-discordbot
  strategy:
    type: Recreate   # Ensures the old pod is fully stopped before the new one starts (safe for single-writer PVCs)
  template:
    metadata:
      labels:
        app: red-discordbot
    spec:
      containers:
        - name: red-discordbot
          image: phasecorex/red-discordbot:latest
          imagePullPolicy: Always
          env:
            - name: OWNER
              valueFrom:
                secretKeyRef:
                  name: discord-bot-secret
                  key: OWNER
            - name: PREFIX
              valueFrom:
                secretKeyRef:
                  name: discord-bot-secret
                  key: PREFIX
            - name: TOKEN
              valueFrom:
                secretKeyRef:
                  name: discord-bot-secret
                  key: TOKEN
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: red-discordbot-pvc
      restartPolicy: Always
