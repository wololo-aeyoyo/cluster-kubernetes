apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: pyroscope-datasource
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  datasource:
    name: Pyroscope
    type: grafana-pyroscope-datasource
    access: proxy
    isDefault: false
    url: http://pyroscope-pyroscope.pyroscope.svc.cluster.local:4040
