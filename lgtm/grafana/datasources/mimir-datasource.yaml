apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: mimir-datasource
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  datasource:
    name: Mimir
    type: prometheus
    access: proxy
    isDefault: true
    url: http://mimir-mimir-gateway.mimir.svc.cluster.local/prometheus
