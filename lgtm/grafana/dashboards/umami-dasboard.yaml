              "rawQuery": true,
              "rawSql": "WITH\nparams AS (\n  SELECT website_id\n  FROM website\n  WHERE name = '${website}'\n),\ntime_bounds AS (\n  SELECT $__timeFrom()::timestamptz AS from_ts,\n         $__timeTo()::timestamptz   AS to_ts\n),\nbounds AS (\n  SELECT\n    date_trunc('day', (from_ts AT TIME ZONE '${timezone}'))::timestamp AS from_day,\n    date_trunc('day', (to_ts   AT TIME ZONE '${timezone}'))::timestamp AS to_day\n  FROM time_bounds\n),\nbounds_ext AS (\n  SELECT (from_day - INTERVAL '7 days') AS from_day_ext, to_day\n  FROM bounds\n),\nseries_all AS (\n  SELECT generate_series(\n           (SELECT from_day_ext FROM bounds_ext),\n           (SELECT to_day       FROM bounds_ext),\n           INTERVAL '1 day'\n         )::timestamp AS ts\n),\n\nqualified_sessions AS (\n  SELECT\n    s.session_id,\n    date_trunc('day', MIN(s.created_at AT TIME ZONE '${timezone}'))::timestamp AS ts\n  FROM session s\n  JOIN website_event w\n    ON w.session_id = s.session_id\n   AND w.website_id = s.website_id\n  JOIN params p\n    ON s.website_id = p.website_id\n  WHERE w.created_at BETWEEN\n        (SELECT from_ts - INTERVAL '7 days' FROM time_bounds)\n        AND (SELECT to_ts FROM time_bounds)\n  GROUP BY s.session_id\n  HAVING COUNT(w.event_id) > 2\n),\n\ndaily AS (\n  SELECT\n    sa.ts,\n    COUNT(qs.session_id) AS count_raw\n  FROM series_all sa\n  LEFT JOIN qualified_sessions qs ON qs.ts = sa.ts\n  GROUP BY sa.ts\n),\n\nma7 AS (\n  SELECT\n    ts,\n    ROUND(\n      AVG(count_raw) OVER (\n        ORDER BY ts\n        ROWS BETWEEN 6 PRECEDING AND CURRENT ROW\n      ), 2\n    ) AS count_ma\n  FROM daily\n)\n\nSELECT\n  ts AS \"time\",\n  'qualified_sessions' AS event_name,\n  count_ma AS \"event:\"\nFROM ma7\nORDER BY \"time\";\n",
