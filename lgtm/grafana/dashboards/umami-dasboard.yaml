              "rawQuery": true,
              "rawSql": "WITH\nparams AS (\n  SELECT website_id\n  FROM website\n  WHERE name = '${website}'\n),\ntime_bounds AS (\n  SELECT $__timeFrom()::timestamptz AS from_ts,\n         $__timeTo()::timestamptz   AS to_ts\n),\n\n-- Build selected event list from the variable (fallback to all events)\nselected_events AS (\n  -- When user selected events\n  SELECT jsonb_array_elements_text(NULLIF('${events:json}','')::jsonb) AS event_name\n  UNION ALL\n  -- When empty or \"All\" → include all event names\n  SELECT e.event_name\n  FROM (SELECT DISTINCT event_name\n        FROM website_event\n        WHERE event_name <> '') e\n  WHERE ('${events:json}' = '' OR '${events:json}' = '[]')\n),\n\nevents_filtered AS (\n  SELECT\n    date_trunc('day', we.created_at AT TIME ZONE '${timezone}')::timestamp AS ts,\n    we.event_name\n  FROM website_event we\n  JOIN params p ON we.website_id = p.website_id\n  WHERE we.event_name IN (SELECT event_name FROM selected_events)\n    AND we.created_at BETWEEN\n        (SELECT from_ts - INTERVAL '7 days' FROM time_bounds)\n        AND (SELECT to_ts FROM time_bounds)\n),\n\ndaily AS (\n  SELECT\n    ts,\n    event_name,\n    COUNT(*) AS count_raw\n  FROM events_filtered\n  GROUP BY ts, event_name\n),\n\nma7 AS (\n  SELECT\n    ts,\n    event_name,\n    ROUND(\n      AVG(count_raw) OVER (\n        PARTITION BY event_name\n        ORDER BY ts\n        ROWS BETWEEN 6 PRECEDING AND CURRENT ROW\n      ), 2\n    ) AS count_ma\n  FROM daily\n)\n\nSELECT\n  ts AS \"time\",\n  event_name,\n  count_ma AS \"event:\"\nFROM ma7\nORDER BY \"time\", event_name;\n",
