              "editorMode": "code",
              "format": "table",
              "rawQuery": true,
              "rawSql": "WITH\nparams AS (\n  SELECT website_id\n  FROM website\n  WHERE name = '${website}'\n),\ntime_bounds AS (\n  SELECT $__timeFrom()::timestamptz AS from_ts,\n         $__timeTo()::timestamptz   AS to_ts\n),\nbounds AS (\n  SELECT\n    date_trunc('day', (from_ts AT TIME ZONE '${timezone}'))::timestamp AS from_day,\n    date_trunc('day', (to_ts   AT TIME ZONE '${timezone}'))::timestamp AS to_day\n  FROM time_bounds\n),\nbounds_ext AS (\n  SELECT (from_day - INTERVAL '7 days') AS from_day_ext, to_day FROM bounds\n),\nseries_all AS (\n  SELECT generate_series(\n    (SELECT from_day_ext FROM bounds_ext),\n    (SELECT to_day       FROM bounds_ext),\n    INTERVAL '1 day'\n  )::timestamp AS ts\n),\nseries AS (\n  SELECT generate_series(\n    (SELECT from_day FROM bounds),\n    (SELECT to_day   FROM bounds),\n    INTERVAL '1 day'\n  )::timestamp AS ts\n),\n\n-- First hit per session (landing), with referrer\nhits AS (\n  SELECT\n    we.session_id,\n    we.created_at,\n    lower(coalesce(we.referrer_domain,'')) AS dom,\n    date_trunc('day', we.created_at AT TIME ZONE '${timezone}')::timestamp AS day_ts\n  FROM website_event we\n  JOIN session s ON s.session_id = we.session_id\n  JOIN params  p ON we.website_id = p.website_id AND s.website_id = p.website_id\n  WHERE coalesce(we.referrer_domain,'') <> ''\n),\nfirst_hit AS (\n  SELECT DISTINCT ON (session_id)\n    session_id, created_at, dom,\n    date_trunc('day', created_at AT TIME ZONE '${timezone}')::timestamp AS ts\n  FROM hits\n  ORDER BY session_id, created_at\n),\n\n-- Classify referrer -> search / llm\nclassified AS (\n  SELECT\n    ts,\n    CASE\n      WHEN dom IN (\n        'chatgpt.com','claude.ai','perplexity.ai','www.perplexity.ai',\n        'you.com','phind.com','copilot.microsoft.com',\n        'gemini.google.com','bard.google.com','deepseek.com','reka.ai'\n      ) THEN 'llm'\n      WHEN dom IN (\n        'com.google.android.googlequicksearchbox',\n        'search.google.com','google.com',\n        'bing.com','duckduckgo.com','ecosia.org',\n        'startpage.com','qwant.com','yandex.ru',\n        'search.brave.com','mx.search.yahoo.com','yahoo.com'\n      ) THEN 'search'\n      WHEN dom LIKE '%.search.yahoo.com' THEN 'search'\n      WHEN dom LIKE '%.google.%'\n           AND dom NOT LIKE 'ads.google.%'\n           AND dom NOT LIKE 'accounts.google.%' THEN 'search'\n      ELSE 'other'\n    END AS src\n  FROM first_hit\n),\n\ndaily AS (\n  SELECT\n    sa.ts,\n    COUNT(*) FILTER (WHERE c.src='search') AS search_raw,\n    COUNT(*) FILTER (WHERE c.src='llm')    AS llm_raw,\n    COUNT(*) FILTER (WHERE c.src='other')  AS other_raw\n  FROM series_all sa\n  LEFT JOIN classified c ON c.ts = sa.ts\n  GROUP BY sa.ts\n),\n\nma7 AS (\n  SELECT\n    ts,\n    ROUND(AVG(search_raw) OVER (ORDER BY ts ROWS BETWEEN 6 PRECEDING AND CURRENT ROW), 2) AS search,\n    ROUND(AVG(llm_raw)    OVER (ORDER BY ts ROWS BETWEEN 6 PRECEDING AND CURRENT ROW), 2) AS llm,\n    ROUND(AVG(other_raw)  OVER (ORDER BY ts ROWS BETWEEN 6 PRECEDING AND CURRENT ROW), 2) AS other\n  FROM daily\n)\n\nSELECT s.ts AS \"time\", m.search, m.llm, m.other\nFROM series s\nLEFT JOIN ma7 m ON m.ts = s.ts\nORDER BY \"time\";\n",
