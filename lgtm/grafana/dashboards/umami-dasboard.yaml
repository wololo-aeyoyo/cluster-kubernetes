              "editorMode": "code",
              "format": "table",
              "rawQuery": true,
              "rawSql": "WITH\nparams AS (\n  SELECT website_id\n  FROM website\n  WHERE name = '${website}'\n),\ntime_bounds AS (\n  SELECT $__timeFrom()::timestamptz AS from_ts,\n         $__timeTo()::timestamptz   AS to_ts\n),\nselected_events AS (\n  SELECT jsonb_array_elements_text(NULLIF('${events:json}','')::jsonb) AS event_name\n  UNION ALL\n  SELECT e.event_name\n  FROM (SELECT DISTINCT event_name\n        FROM website_event\n        WHERE event_name <> '') e\n  WHERE ('${events:json}' = '' OR '${events:json}' = '[]')\n),\n\n-- Base event totals\nevent_totals AS (\n  SELECT\n    we.event_name,\n    COUNT(*) AS count_total\n  FROM website_event we\n  JOIN params p ON we.website_id = p.website_id\n  WHERE we.event_name IN (SELECT event_name FROM selected_events)\n    AND we.created_at BETWEEN\n        (SELECT from_ts FROM time_bounds)\n        AND (SELECT to_ts FROM time_bounds)\n  GROUP BY we.event_name\n),\n\n-- Qualified session total (sessions with >2 events)\nqualified_sessions AS (\n  SELECT COUNT(*) AS count_total\n  FROM (\n    SELECT s.session_id\n    FROM session s\n    JOIN website_event w\n      ON w.session_id = s.session_id\n     AND w.website_id = s.website_id\n    JOIN params p\n      ON s.website_id = p.website_id\n    WHERE w.created_at BETWEEN\n          (SELECT from_ts FROM time_bounds)\n          AND (SELECT to_ts FROM time_bounds)\n    GROUP BY s.session_id\n    HAVING COUNT(w.event_id) > 2\n  ) qs\n)\n\n-- Merge both into one result set\nSELECT event_name, count_total AS \"event:\"\nFROM event_totals\nUNION ALL\nSELECT 'qualified_sessions', count_total\nFROM qualified_sessions\nORDER BY \"event:\" DESC;\n",
