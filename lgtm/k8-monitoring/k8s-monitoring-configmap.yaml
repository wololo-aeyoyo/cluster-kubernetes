apiVersion: v1
kind: ConfigMap
metadata:
  name: k8s-monitoring-configmap
  namespace: alloy
data:
  values.yaml: |
    cluster:
      name: default

    destinations:
      loki:
        type: loki
        url: http://loki-loki-gateway.loki.svc.cluster.local/loki/api/v1/push
      mimir:
        type: prometheus
        url: http://mimir-mimir-gateway.mimir.svc.cluster.local/api/v1/push

    collectors:
      alloy-logs:
        enabled: true
        alloy:
          clustering:
            enabled: true
      alloy-metrics:
        enabled: true
        alloy:
          clustering:
            enabled: true

    podLogsViaKubernetesApi:
      enabled: true
      collector: alloy-logs

    clusterEvents:
      enabled: true
      collector: alloy-singleton

    telemetryServices:
      kube-state-metrics:
        deploy: true
      node-exporter:
        deploy: true

    nodeMetrics:
      enabled: true
      collector: alloy-metrics
      destinations:
        - mimir

    clusterMetrics:  
      enabled: true
      collector: alloy-logs  
      node-exporter:  
        enabled: true  
        metricsTuning:  
          useIntegrationAllowList: true  # This includes node_memory_MemTotal_bytes
        

    podLogs:
      enabled: false

    hostMetrics:
      enabled: false

    integrations:
      node_exporter:
        enabled: true
        collector: alloy-metrics
        destinations:
          - mimir
      metricsTuning:  
        useIntegrationAllowList: true  # This includes node_memory_MemTotal_bytes