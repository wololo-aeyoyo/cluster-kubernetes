apiVersion: v1
kind: ConfigMap
metadata:
  name: k8s-monitoring-configmap
  namespace: alloy
data:
  values.yaml: |
    cluster:
      name: default

    destinations:
      loki:
        type: loki
        url: http://loki-loki-gateway.loki.svc.cluster.local/loki/api/v1/push

    alloy-logs:
      enabled: true
      alloy:
        configMap:
          create: true
      logs:
        pod_logs:
          enabled: true
          namespaces: []
        cluster_events:
          enabled: true

    alloy-metrics:
      enabled: false

    alloy-receiver:
      enabled: false
