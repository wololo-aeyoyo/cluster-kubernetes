apiVersion: v1
kind: ConfigMap
metadata:
  name: k8s-monitoring-configmap
  namespace: alloy
data:
  values.yaml: |
    cluster:
      name: default

    destinations:
      loki:
        type: loki
        url: http://loki-loki-gateway.loki.svc.cluster.local/loki/api/v1/push

    collectors:
      alloy-logs:
        enabled: true
        alloy:
          clustering:
            enabled: true

    podLogsViaKubernetesApi:
      enabled: true

    clusterEvents:
      enabled: true
