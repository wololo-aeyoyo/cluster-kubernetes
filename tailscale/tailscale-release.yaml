---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: tailscale
spec:
  chart:
    spec:
      chart: tailscale-operator
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: tailscale-repo
        namespace: flux-system
  install:
    createNamespace: true
  interval: 1h0m0s
  targetNamespace: tailscale
  values:
    oauth:
      client_id:
        valueFrom:
          secretKeyRef:
            name: operator-oauth
            key: CLIENT_ID
      client_secret:
        valueFrom:
          secretKeyRef:
            name: operator-oauth
            key: CLIENT_SECRET
