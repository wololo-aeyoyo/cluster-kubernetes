apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: my-agent
  namespace: openclaw
spec:
  autoUpdate:  
    enabled: true  
    checkInterval: "24h"  
    backupBeforeUpdate: true  
    rollbackOnFailure: true  
    healthCheckTimeout: "10m"
  env:
    - name: OLLAMA_API_KEY  
      value: "ollama-local"
    - name: ANTHROPIC_API_KEY
      valueFrom:
        secretKeyRef:
          name: openclaw-api-keys
          key: ANTHROPIC_API_KEY
    - name: OPENAI_API_KEY
      valueFrom:
        secretKeyRef:
          name: openclaw-api-keys
          key: OPENAI_API_KEY
  config:
    raw:
      agents:
        defaults:
          model:
            primary: "ollama/kimi-k2.5:cloud"
            fallbacks: ["ollama/gemma4", "anthropic/claude-sonnet-4-20250514"]
  storage:
    persistence:
      enabled: true
      size: 10Gi
  chromium: #Chromium sidecar configuration
    enabled: true
    image:
      repository: chromedp/headless-shell  # default
      tag: "stable"
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "2Gi"
    # Pass extra flags to the Chromium process (appended to built-in anti-bot defaults)
    extraArgs:
      - "--user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
    # Inject extra environment variables into the sidecar
    extraEnv:
      - name: DISPLAY
        value: ":99"
  security:
    networkPolicy:
      enabled: true
      allowedIngressNamespaces:
        - default
  gateway:
    controlUiOrigins:
      - "https://openclaw.wololoaeyoyo.com"
  ollama:  
    enabled: true  
    models:  
      - nomic-embed-text
      - kimi-k2.5:cloud