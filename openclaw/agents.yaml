apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: my-agent
  namespace: openclaw
spec:
  autoUpdate:  
    enabled: true  
    checkInterval: "24h"  
    backupBeforeUpdate: true  
    rollbackOnFailure: true  
    healthCheckTimeout: "10m"
  env:
    - name: OPENAI_BASE_URL
      value: "http://localhost:11434"
    - name: ANTHROPIC_API_KEY
      valueFrom:
        secretKeyRef:
          name: openclaw-api-keys
          key: ANTHROPIC_API_KEY
    - name: OPENAI_API_KEY
      valueFrom:
        secretKeyRef:
          name: openclaw-api-keys
          key: OPENAI_API_KEY
  config:
    raw:
      agents:
        defaults:
          model:
            primary: "ollama/kimi-k2.5:cloud"
            fallbacks: ["ollama/gemma4", "anthropic/claude-sonnet-4-20250514"]
  storage:
    persistence:
      enabled: true
      size: 10Gi
  chromium: #Chromium sidecar configuration
    enabled: true
    image:
      repository: chromedp/headless-shell  # default
      tag: "stable"
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "2Gi"
    # Pass extra flags to the Chromium process (appended to built-in anti-bot defaults)
    extraArgs:
      - "--user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
    # Inject extra environment variables into the sidecar
    extraEnv:
      - name: DISPLAY
        value: ":99"
  security:
    networkPolicy:
      enabled: true
      allowedIngressNamespaces:
        - default
  gateway:
    controlUiOrigins:
      - "https://openclaw.wololoaeyoyo.com"
  ollama:
    enabled: false
  # Use custom sidecar with API key  
  sidecars:  
    - name: ollama  
      image: ollama/ollama:latest  
      ports:  
        - containerPort: 11434  
          protocol: TCP  
      command: ["/bin/sh", "-c"]
      args:
        - |
          ollama serve &
          sleep 5
          ollama pull kimi-k2.5:cloud
          ollama pull gemma4:e2b
          wait
      env:
        - name: OLLAMA_API_KEY
          valueFrom:  
            secretKeyRef:  
              name: ollama-api-keys  
              key: OLLAMA_API_KEY  
      volumeMounts:  
        - name: ollama-models  
          mountPath: /root/.ollama  
      resources:  
        requests:  
          cpu: "2"  
          memory: 4Gi  
        limits:  
          cpu: "8"  
          memory: 16Gi  
    
  sidecarVolumes:  
    - name: ollama-models  
      emptyDir:  
        sizeLimit: 20Gi  