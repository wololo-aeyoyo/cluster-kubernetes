apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: yt-dlp-ui
  namespace: flux-system
spec:
  image: ghcr.io/wololo-aeyoyo/yt-dlp-ui
  interval: 1m0s
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: yt-dlp-ui
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: yt-dlp-ui
  filterTags:
    pattern: ^main-[0-9]{14}$
  policy:
    alphabetical:
      order: asc
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: yt-dlp-ui
  namespace: flux-system
spec:
  interval: 1m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: fluxcdbot@users.noreply.github.com
        name: fluxcdbot
      messageTemplate: "chore(yt-dlp-ui): update image to {{range .Updated.Images}}{{println .}}{{end}}"
    push:
      branch: main
  update:
    path: ./yt-dlp-ui
    strategy: Setters
