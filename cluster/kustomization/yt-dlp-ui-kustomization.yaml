apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: yt-dlp-ui
  namespace: flux-system
spec:
  interval: 1m
  path: ./yt-dlp-ui
  prune: true
  timeout: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: yt-dlp-ui
      namespace: yt-dlp-ui
