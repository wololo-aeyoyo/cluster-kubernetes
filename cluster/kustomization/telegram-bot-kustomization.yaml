apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: telegram-bot
  namespace: flux-system
spec:
  interval: 1m
  path: ./telegram-bot
  prune: true
  timeout: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: telegram-bot
      namespace: telegram-bot
