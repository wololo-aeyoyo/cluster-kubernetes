apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: github-readme-stats
  namespace: flux-system
spec:
  interval: 1m
  path: ./github-readme-stats
  prune: true
  timeout: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: github-readme-stats
