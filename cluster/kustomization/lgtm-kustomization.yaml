apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana-system
  namespace: flux-system
spec:
  dependsOn:
    - name: grafana-operator # Depends on the grafana-operator being synced
  interval: 1m
  path: ./lgtm/grafana
  force: true
  prune: true
  timeout: 1m
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: loki-system
  namespace: flux-system
spec:
  interval: 1m
  path: ./lgtm/loki
  prune: true
  timeout: 1m
  sourceRef:
    kind: GitRepository
    name: flux-system
