apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana-system
  namespace: flux-system
spec:
  dependsOn:
    - name: grafana-operator # Depends on the grafana-operator being synced
  interval: 1m
  path: ./lgtm/grafana
  force: true
  prune: true
  timeout: 1m
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: loki-system
  namespace: flux-system
spec:
  interval: 1m
  path: ./lgtm/loki
  prune: true
  timeout: 1m
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: k8s-monitoring-system
  namespace: flux-system
spec:
  interval: 1m
  path: ./lgtm/k8-monitoring
  prune: true
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: loki-system   # adjust to match your Loki Kustomization name
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: k8s-monitoring
      namespace: alloy
